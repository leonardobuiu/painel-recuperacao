<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Recuperação — Leonardo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f8f7f4;--surface:#ffffff;--surface1:#f1f0ec;
  --border:rgba(11,11,11,.10);--border-strong:rgba(11,11,11,.18);
  --text:#0b0b0b;--text2:#52514e;--text3:#898781;
  --accent:#2a78d6;--accent-bg:#e6f1fb;--accent-border:#b5d4f4;
  --green:#1baf7a;--green-bg:#e1f5ee;--green-border:#9fe1cb;
  --red:#d03b3b;--red-bg:#fcebeb;--red-border:#f7c1c1;
  --yellow:#ba7517;--yellow-bg:#faeeda;--yellow-border:#fac775;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;padding:24px 16px 60px;max-width:720px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.api-row{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.api-row input{flex:1;background:var(--surface);border:.5px solid var(--border-strong);border-radius:var(--radius);padding:9px 12px;font-family:monospace;font-size:12px;color:var(--text);outline:none}
.api-row input:focus{border-color:var(--accent)}
.sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;white-space:nowrap}
.sync-ok{color:var(--green)}.sync-err{color:var(--red)}
.spin{display:inline-block;width:12px;height:12px;border:1.5px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
button{background:var(--surface);border:.5px solid var(--border-strong);border-radius:var(--radius);padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px}
button:hover{background:var(--surface1)}
.tabs{display:flex;gap:2px;background:var(--surface1);border-radius:var(--radius);padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;font-size:13px;font-weight:500;text-align:center;border-radius:calc(var(--radius) - 2px);cursor:pointer;color:var(--text2);border:none;background:transparent}
.tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sec{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:1.25rem 0 .6rem}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.metric{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:.85rem;text-align:center}
.metric-n{font-size:22px;font-weight:500}
.metric-l{font-size:11px;color:var(--text2);margin-top:2px}
.day-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:1.25rem}
.day-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.day-name{font-size:11px;color:var(--text3);font-weight:500}
.day-name.today{color:var(--accent)}
.day-date{font-size:10px;color:var(--text3)}
.pain-sel{width:44px;height:28px;font-size:12px;text-align:center;border-radius:6px;border:.5px solid var(--border-strong);background:var(--surface);color:var(--text);outline:none}
.pain-ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.pain-bad{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.row-line{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.row-label{width:68px;font-size:12px;color:var(--text2);flex-shrink:0}
.row-label.today{color:var(--accent);font-weight:500}
.seg-group{display:flex;gap:3px;flex:1}
.seg{flex:1;padding:6px 2px;font-size:11px;text-align:center;border-radius:6px;border:.5px solid var(--border-strong);background:var(--surface);cursor:pointer;color:var(--text2)}
.seg:hover{background:var(--surface1)}
.seg.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);font-weight:500}
.seg.hevy{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.badge-hevy{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);border:.5px solid var(--green-border);white-space:nowrap}
.cup-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.cup{cursor:pointer;font-size:22px;line-height:1;user-select:none}
.supp-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.supp{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--radius);border:.5px solid var(--border-strong);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text2)}
.supp:hover{background:var(--surface1)}
.supp.on{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.no-data{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.no-data i{font-size:32px;display:block;margin-bottom:.5rem}
.ex-sel{width:100%;margin-bottom:1rem;font-size:13px;padding:9px 10px;border-radius:var(--radius);border:.5px solid var(--border-strong);background:var(--surface);color:var(--text);outline:none}
.prog-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.prog-card h3{font-size:15px;font-weight:500;margin-bottom:.25rem}
.prog-card p{font-size:12px;color:var(--text2);margin-bottom:.75rem}
.chart-wrap{position:relative;width:100%;height:220px}
.legend{display:flex;gap:12px;margin-bottom:.5rem;font-size:12px;color:var(--text2);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.prog-bar-item{margin-bottom:.85rem}
.prog-bar-item .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.prog-bar-item .name{font-size:13px;font-weight:500}
.prog-bar-item .delta{font-size:13px;font-weight:500}
.prog-bar-item .track{height:4px;background:var(--surface1);border-radius:2px;overflow:hidden}
.prog-bar-item .fill{height:100%;border-radius:2px;transition:width .4s}
.prog-bar-item .sessions{font-size:11px;color:var(--text3);margin-top:2px}
</style>
</head>
<body>

<h1>Painel de Recuperação</h1>
<p class="sub">Tracker diário + progressão de carga — Leonardo</p>

<div class="api-row">
  <input type="password" id="apiKey" placeholder="Chave de API do Hevy…" value="002e30b6-d5bb-45b7-a2b4-6eb6f0122eb0">
  <button onclick="syncHevy(true)"><i class="ti ti-refresh"></i> Sincronizar</button>
  <div class="sync-status" id="syncStatus"></div>
</div>

<div class="tabs">
  <button class="tab on" onclick="showTab('tracker',this)">Tracker diário</button>
  <button class="tab" onclick="showTab('dashboard',this)">Progressão de carga</button>
</div>

<div id="tab-tracker"></div>
<div id="tab-dashboard" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STORAGE_KEY='tracker-state-v1';
const HEVY_EX_MAP={
  'supino inclinado':'Supino inclinado articulado','crucifixo no voador':'Peck deck / Crucifixo',
  'peck deck':'Peck deck / Crucifixo','tríceps na polia':'Tríceps polia alta',
  'triceps na polia':'Tríceps polia alta','máquina de fundos':'Tríceps máquina',
  'maquina de fundos':'Tríceps máquina','puxada frontal':'Puxada frontal na polia',
  'remada baixa':'Remada baixa na polia','remada cavalinho':'Remada cavalinho',
  'rosca direta':'Rosca direta','rosca com rotação':'Rosca martelo / cabo',
  'desenvolvimento de ombros':'Desenvolvimento','elevação lateral':'Elevação lateral',
  'elevacao lateral':'Elevação lateral','aberturas invertidas':'Crucifixo inverso',
  'leg press horizontal':'Leg press','cadeira extensora':'Cadeira extensora',
  'cadeira flexora':'Cadeira flexora','cadeira abdutora':'Cadeira abdutora',
  'elevação de panturrilha sentado':'Panturrilha','inseto morto':'Dead bug',
  'elevação pélvica no solo':'Ponte','prancha abdominal':'Prancha frontal',
  'supino sentado':'Supino reto (máquina)',
};
const WEEKDAY=['dom','seg','ter','qua','qui','sex','sáb'];
function fmtDate(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')}
function keyFor(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim()}

const today=new Date();
const days=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-(6-i));return d});
let state={pain:{},training:{},sleep:{},water:{},supplements:{},hevySynced:{}};
let hevyWorkouts=[];
let chartInstances={};

async function loadState(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=Object.assign(state,JSON.parse(raw));}catch(e){}
}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}

async function syncHevy(manual=false){
  const key=document.getElementById('apiKey').value.trim();
  if(!key)return;
  const st=document.getElementById('syncStatus');
  st.innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch('https://api.hevyapp.com/v1/workouts?page=1&pageSize=20',{method:'GET',headers:{'api-key':key}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    hevyWorkouts=data.workouts||[];
    applyHevyToTracker();
    const dt=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    st.innerHTML=`<span class="sync-ok"><i class="ti ti-check"></i> Sincronizado às ${dt}</span>`;
    renderTracker();
    if(document.getElementById('tab-dashboard').style.display!=='none')renderDashboard();
  }catch(e){
    st.innerHTML=`<span class="sync-err"><i class="ti ti-alert-circle"></i> ${e.message}</span>`;
    renderTracker();
  }
}

function applyHevyToTracker(){
  state.hevySynced={};
  for(const w of hevyWorkouts){
    const wDate=new Date(w.start_time);
    const k=keyFor(wDate);
    const inRange=days.some(d=>isSameDay(d,wDate));
    if(!inRange)continue;
    const title=norm(w.title);
    const isAcademia=['peito','tricep','costas','bicep','ombro','inferior'].some(kw=>title.includes(kw));
    if(isAcademia){
      if(!state.training[k]||state.training[k]==='nenhum')state.training[k]='academia';
      else if(state.training[k]==='casa')state.training[k]='ambos';
      state.hevySynced[k]=w.title;
    }
  }
  saveState();
}

function showTab(id,btn){
  document.getElementById('tab-tracker').style.display=id==='tracker'?'':'none';
  document.getElementById('tab-dashboard').style.display=id==='dashboard'?'':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  if(id==='dashboard')renderDashboard();
}

function setPain(k,v){state.pain[k]=state.pain[k]===v?undefined:v;saveState();renderTracker()}
function setTraining(k,v){state.training[k]=state.training[k]===v?undefined:v;saveState();renderTracker()}
function setSleep(k,v){state.sleep[k]=state.sleep[k]===v?undefined:v;saveState();renderTracker()}
function setWater(k,n){const c=state.water[k]||0;state.water[k]=c===n?n-1:n;saveState();renderTracker()}
function toggleSupp(k,s){if(!state.supplements[k])state.supplements[k]={};state.supplements[k][s]=!state.supplements[k][s];saveState();renderTracker()}

function renderTracker(){
  const todayKey=keyFor(today);
  const painHigh=days.filter(d=>{const p=state.pain[keyFor(d)];return p!==undefined&&p>3}).length;
  const trained=days.filter(d=>{const t=state.training[keyFor(d)];return t&&t!=='nenhum'}).length;
  const waterVals=days.map(d=>state.water[keyFor(d)]||0);
  const waterAvg=(waterVals.reduce((a,b)=>a+b,0)/7).toFixed(1);
  const waterCount=state.water[todayKey]||0;
  const todaySupp=state.supplements[todayKey]||{};

  let h=`<div class="sum-grid">
    <div class="metric"><div class="metric-n" style="color:${painHigh>0?'var(--red)':'var(--text)'}">${painHigh}</div><div class="metric-l">Dias com dor >3</div></div>
    <div class="metric"><div class="metric-n">${trained}</div><div class="metric-l">Dias treinados</div></div>
    <div class="metric"><div class="metric-n">${waterAvg}</div><div class="metric-l">Média de água</div></div>
  </div>

  <p class="sec">Dor (0–10)</p>
  <div class="day-grid">`;

  for(const d of days){
    const k=keyFor(d);const isT=isSameDay(d,today);const val=state.pain[k];
    const cls=val===undefined?'':(val>3?'pain-bad':'pain-ok');
    h+=`<div class="day-col">
      <span class="day-name${isT?' today':''}">${WEEKDAY[d.getDay()]}</span>
      <span class="day-date">${fmtDate(d)}</span>
      <select class="pain-sel ${cls}" onchange="setPain('${k}',this.value===''?undefined:+this.value)">
        <option value="">–</option>
        ${Array.from({length:11},(_,i)=>`<option value="${i}"${val===i?' selected':''}>${i}</option>`).join('')}
      </select>
    </div>`;
  }

  h+=`</div><p class="sec">Treino do dia</p>`;
  for(const d of days){
    const k=keyFor(d);const isT=isSameDay(d,today);const val=state.training[k];const synced=state.hevySynced?.[k];
    h+=`<div class="row-line">
      <span class="row-label${isT?' today':''}">${WEEKDAY[d.getDay()]} ${fmtDate(d)}</span>
      <div class="seg-group">
        ${[['casa','Casa'],['academia','Academia'],['ambos','Ambos'],['nenhum','Nenhum']].map(([v,l])=>
          `<button class="seg${val===v?(synced&&v==='academia'?' hevy':' on'):''}" onclick="setTraining('${k}','${v}')">${l}</button>`
        ).join('')}
      </div>
      ${synced?`<span class="badge-hevy"><i class="ti ti-bolt"></i>${synced.split(' ')[0]}</span>`:''}
    </div>`;
  }

  h+=`<p class="sec">Sono</p>`;
  for(const d of days){
    const k=keyFor(d);const isT=isSameDay(d,today);const val=state.sleep[k];
    h+=`<div class="row-line">
      <span class="row-label${isT?' today':''}">${WEEKDAY[d.getDay()]} ${fmtDate(d)}</span>
      <div class="seg-group">
        ${[['otimo','Ótimo'],['bom','Bom'],['regular','Regular'],['ruim','Ruim']].map(([v,l])=>
          `<button class="seg${val===v?' on':''}" onclick="setSleep('${k}','${v}')">${l}</button>`
        ).join('')}
      </div>
    </div>`;
  }

  h+=`<p class="sec">Água — meta 8 copos (hoje, ${fmtDate(today)})</p>
  <div class="cup-row">
    ${Array.from({length:8},(_,i)=>`<span class="cup" onclick="setWater('${todayKey}',${i+1})" title="${i+1} copos">${i+1<=waterCount?'🥤':'⬜'}</span>`).join('')}
    <span style="font-size:13px;color:var(--text2);margin-left:6px">${waterCount} / 8</span>
  </div>

  <p class="sec">Suplementos (hoje)</p>
  <div class="supp-row">
    ${[['whey','Whey protein','ti-flask'],['creatina','Creatina','ti-pill'],['magnesio','Magnésio','ti-leaf']].map(([k2,l,ic])=>`
      <button class="supp${todaySupp[k2]?' on':''}" onclick="toggleSupp('${todayKey}','${k2}')">
        <i class="ti ${ic}" style="font-size:16px"></i>${l}
        ${todaySupp[k2]?'<i class="ti ti-check" style="font-size:13px;margin-left:4px"></i>':''}
      </button>`).join('')}
  </div>`;

  document.getElementById('tab-tracker').innerHTML=h;
}

function renderDashboard(){
  if(!hevyWorkouts.length){
    document.getElementById('tab-dashboard').innerHTML='<div class="no-data"><i class="ti ti-chart-bar"></i>Sincronize com o Hevy para ver a progressão de carga.</div>';
    return;
  }

  const exHistory={};
  for(const w of [...hevyWorkouts].reverse()){
    const wDate=new Date(w.start_time);
    const dateLabel=fmtDate(wDate);
    for(const ex of(w.exercises||[])){
      const rawName=norm(ex.title||'');
      let mappedName=ex.title;
      for(const[k,v] of Object.entries(HEVY_EX_MAP)){
        if(rawName.includes(norm(k))){mappedName=v;break;}
      }
      const sets=ex.sets||[];
      const maxW=Math.max(0,...sets.map(s=>s.weight_kg||0));
      const avgR=sets.length?Math.round(sets.reduce((a,s)=>a+(s.reps||0),0)/sets.length):0;
      if(maxW>0){
        if(!exHistory[mappedName])exHistory[mappedName]=[];
        exHistory[mappedName].push({date:dateLabel,weight:maxW,reps:avgR,rawDate:wDate});
      }
    }
  }

  const exNames=Object.keys(exHistory).filter(n=>exHistory[n].length>=1).sort();
  const progress=exNames.map(n=>{
    const h=exHistory[n];
    const first=h[0].weight,last=h[h.length-1].weight;
    return{name:n,delta:last-first,pct:first>0?((last-first)/first*100):0,sessions:h.length,current:last};
  }).sort((a,b)=>b.delta-a.delta);

  const totalSess=new Set(hevyWorkouts.map(w=>keyFor(new Date(w.start_time)))).size;
  const withProg=progress.filter(p=>p.delta>0).length;
  const bestEx=progress[0];

  let h=`<div class="sum-grid">
    <div class="metric"><div class="metric-n">${totalSess}</div><div class="metric-l">Treinos registrados</div></div>
    <div class="metric"><div class="metric-n" style="color:var(--green)">${withProg}</div><div class="metric-l">Exercícios evoluindo</div></div>
    <div class="metric"><div class="metric-n" style="color:var(--accent)">${bestEx?'+'+bestEx.delta.toFixed(1)+'kg':'—'}</div><div class="metric-l">${bestEx?bestEx.name.split('/')[0].trim():'Melhor progressão'}</div></div>
  </div>

  <p class="sec">Evolução por exercício</p>
  <select class="ex-sel" id="exSel" onchange="renderExChart(this.value)">
    <option value="">Selecione um exercício…</option>
    ${exNames.map(n=>`<option value="${n}">${n} (${exHistory[n].length} sessão${exHistory[n].length!==1?'ões':''})</option>`).join('')}
  </select>
  <div id="exChartArea"></div>

  <p class="sec">Resumo de progressão</p>`;

  for(const p of progress.slice(0,10)){
    const arrow=p.delta>0?'↑':p.delta<0?'↓':'→';
    const color=p.delta>0?'var(--green)':p.delta<0?'var(--red)':'var(--text3)';
    const barW=Math.min(100,Math.abs(p.pct));
    h+=`<div class="prog-bar-item">
      <div class="top"><span class="name">${p.name}</span><span class="delta" style="color:${color}">${arrow} ${p.delta>=0?'+':''}${p.delta.toFixed(1)}kg &nbsp;(${p.current.toFixed(1)}kg atual)</span></div>
      <div class="track"><div class="fill" style="width:${barW}%;background:${color}"></div></div>
      <div class="sessions">${p.sessions} sessão${p.sessions!==1?'ões':''}</div>
    </div>`;
  }

  document.getElementById('tab-dashboard').innerHTML=h;
  window._exHistory=exHistory;
}

function renderExChart(exName){
  const area=document.getElementById('exChartArea');
  if(!exName){area.innerHTML='';return;}
  const history=window._exHistory?.[exName]||[];
  if(!history.length){area.innerHTML='<div class="no-data">Sem dados para este exercício.</div>';return;}
  if(chartInstances.exChart){chartInstances.exChart.destroy();delete chartInstances.exChart;}

  area.innerHTML=`<div class="prog-card">
    <h3>${exName}</h3>
    <p>${history.length} sessão${history.length!==1?'ões':''} registrada${history.length!==1?'s':''}</p>
    <div class="legend">
      <span><span class="leg-dot" style="background:#2a78d6"></span>Carga máxima (kg)</span>
      <span><span class="leg-dot" style="background:#1baf7a;border-radius:50%"></span>Média de reps</span>
    </div>
    <div class="chart-wrap"><canvas id="exChart" role="img" aria-label="Gráfico de progressão de ${exName}"></canvas></div>
  </div>`;

  chartInstances.exChart=new Chart(document.getElementById('exChart'),{
    data:{labels:history.map(h=>h.date),datasets:[
      {type:'line',label:'Carga máx (kg)',data:history.map(h=>h.weight),borderColor:'#2a78d6',backgroundColor:'rgba(42,120,214,.08)',borderWidth:2,pointBackgroundColor:'#2a78d6',pointRadius:5,pointHoverRadius:7,yAxisID:'y',tension:.3},
      {type:'bar',label:'Reps (média)',data:history.map(h=>h.reps),backgroundColor:'rgba(27,175,122,.25)',borderColor:'#1baf7a',borderWidth:1,yAxisID:'y2',borderRadius:3},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.datasetIndex===0?`${ctx.raw.toFixed(1)} kg`:`${ctx.raw} reps`}}},
      scales:{
        x:{ticks:{font:{size:11},color:'#898781',maxRotation:45,autoSkip:false},grid:{display:false}},
        y:{position:'left',title:{display:true,text:'kg',font:{size:11},color:'#898781'},ticks:{font:{size:11},color:'#898781'},grid:{color:'rgba(0,0,0,.06)'}},
